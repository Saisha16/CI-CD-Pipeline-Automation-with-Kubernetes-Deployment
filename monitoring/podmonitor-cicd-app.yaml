apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cicd-app
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
    - devops
  selector:
    matchLabels:
      app: cicd
  podMetricsEndpoints:
  - path: /actuator/prometheus
    interval: 15s
    targetPort: 8080
