apiVersion: apps/v1
kind: Deployment

metadata:
  name: elasticsearch
  namespace: __KUBE_NAMESPACE__

spec:

  replicas: 1

  selector:
    matchLabels:
      app: elasticsearch

  template:

    metadata:
      labels:
        app: elasticsearch

    spec:

      containers:

      - name: elasticsearch

        image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0

        env:

        - name: discovery.type

          value: single-node
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: __KUBE_NAMESPACE__
spec:
  selector:
    app: elasticsearch
  ports:
  - name: http
    port: 9200
    targetPort: 9200