apiVersion: apps/v1
kind: Deployment

metadata:
  name: app-blue
  namespace: devops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cicd
      version: blue

  template:
    metadata:
      labels:
        app: cicd
        version: blue

    spec:
      containers:
      - name: app
        image: cicd-app:20260410144325
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "200m"
          limits:
            cpu: "500m"
